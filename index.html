<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한월환해도 (0404 업데이트)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
        /* 1. 픽셀 폰트 불러오기 */
        @font-face {
            font-family: 'NeoDunggeunmo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        body { 
            margin: 0; padding: 0; background-color: #1a1a1a; 
            font-family: 'NeoDunggeunmo', sans-serif;
        }
        
        #map { width: 100vw; height: 100vh; }
        
        /* 2. 마인크래프트 인벤토리/버튼 스타일의 UI 창 */
        .leaflet-popup-content-wrapper {
            background-color: #c6c6c6; /* 마크 특유의 밝은 회색 바탕 */
            border: 3px solid #000000; /* 바깥쪽 굵은 검은색 테두리 */
            border-radius: 0; /* 둥근 모서리 완전 제거 */
            
            /* [핵심] 안쪽 하얀색 & 어두운 회색 테두리로 입체감(Bevel) 만들기 */
            box-shadow: inset 3px 3px 0px #ffffff, inset -3px -3px 0px #555555 !important; 
            padding: 2px;
        }

        /* 말풍선 아래의 뾰족한 꼬리표 숨기기 (깔끔한 네모를 위해) */
        .leaflet-popup-tip-container {
            display: none;
        }

        /* 3. 글씨 및 외곽선 스타일 */
        .leaflet-popup-content {
            font-family: 'NeoDunggeunmo', sans-serif;
            font-size: 18px; /* 글씨 크기 */
            text-align: center;
            color: #ffffff; /* 글자색은 흰색 */
            margin: 12px 16px !important;
            line-height: 1.6;
            
            /* [핵심] 글씨 밖으로 2px 두께의 뚜렷한 검은색 테두리(외곽선) 만들기 */
            text-shadow: 
                2px 2px 0 #000, -2px -2px 0 #000, 
                2px -2px 0 #000, -2px 2px 0 #000,
                2px 0 0 #000, -2px 0 0 #000, 
                0 2px 0 #000, 0 -2px 0 #000;
        }

        /* 닫기(X) 버튼 숨기기 (사진과 동일하게 깔끔한 UI를 위해) */
        .leaflet-popup-close-button {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <script src="js/data.js"></script>         
    <script src="js/map-logic.js"></script>    
    <script src="js/ui-control.js"></script>   

</body>
</html>
